openapi: 3.1.0
info:
  title: Trading System Manager API
  version: 0.1.0
  summary: Trading management platform API for Codex scaffold
servers:
  - url: http://localhost:8080
tags:
  - name: positions
  - name: pnl
  - name: review
  - name: indicators
  - name: marketdata
  - name: marketevents

paths:
  /v1/positions:
    get:
      tags: [positions]
      summary: Query current or historical positions
      parameters:
        - in: query
          name: account_id
          required: true
          schema: { type: string }
        - in: query
          name: strategy_id
          required: false
          schema: { type: string }
        - in: query
          name: as_of_ts
          required: false
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Position list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPositionsResponse'

  /v1/positions/adjustments:
    post:
      tags: [positions]
      summary: Create a manual position adjustment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePositionAdjustmentRequest'
      responses:
        "201":
          description: Created

  /v1/pnl/summary:
    get:
      tags: [pnl]
      summary: Query pnl summary
      parameters:
        - in: query
          name: account_id
          required: true
          schema: { type: string }
        - in: query
          name: strategy_id
          required: false
          schema: { type: string }
        - in: query
          name: from
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: to
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: base_currency
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PnL summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PnLSummaryResponse'

  /v1/reviews/summary:
    get:
      tags: [review]
      summary: Query review summary report
      parameters:
        - in: query
          name: account_id
          required: true
          schema: { type: string }
        - in: query
          name: from
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: to
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Review summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSummaryResponse'

  /v1/indicators:
    get:
      tags: [indicators]
      summary: Query indicator values
      parameters:
        - in: query
          name: instrument_id
          required: true
          schema: { type: string }
        - in: query
          name: timeframe
          required: true
          schema: { type: string }
        - in: query
          name: indicator
          required: true
          schema: { type: string }
        - in: query
          name: from
          required: false
          schema: { type: integer, format: int64 }
        - in: query
          name: to
          required: false
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Indicator series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndicatorQueryResponse'

  /v1/marketdata/candles:
    get:
      tags: [marketdata]
      summary: Query candles
      parameters:
        - in: query
          name: instrument_id
          required: true
          schema: { type: string }
        - in: query
          name: timeframe
          required: true
          schema: { type: string }
        - in: query
          name: from
          required: false
          schema: { type: integer, format: int64 }
        - in: query
          name: to
          required: false
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Candle list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandleQueryResponse'

  /v1/marketevents:
    get:
      tags: [marketevents]
      summary: Query market events
      parameters:
        - in: query
          name: category
          required: false
          schema: { type: string }
        - in: query
          name: instrument_id
          required: false
          schema: { type: string }
        - in: query
          name: from
          required: false
          schema: { type: integer, format: int64 }
        - in: query
          name: to
          required: false
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Market event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketEventQueryResponse'

components:
  schemas:
    MoneyMap:
      type: object
      additionalProperties:
        type: string
      example:
        USDT: "123.45"

    PositionItem:
      type: object
      properties:
        instrument_id: { type: string }
        net_qty: { type: string }
        avg_cost_price: { type: string }
        mark_price: { type: string }
        gross_notional: { type: string }
        realized_pnl_ccy: { $ref: '#/components/schemas/MoneyMap' }
        unrealized_pnl_ccy: { $ref: '#/components/schemas/MoneyMap' }
        margin_used: { type: string }
        leverage: { type: string }
        cost_method: { type: string, enum: [AVG_COST, FIFO] }
        updated_at: { type: integer, format: int64 }
      required: [instrument_id, net_qty, avg_cost_price]

    GetPositionsResponse:
      type: object
      properties:
        account_id: { type: string }
        as_of_ts: { type: integer, format: int64 }
        positions:
          type: array
          items:
            $ref: '#/components/schemas/PositionItem'

    CreatePositionAdjustmentRequest:
      type: object
      properties:
        account_id: { type: string }
        instrument_id: { type: string }
        delta_qty: { type: string }
        reason: { type: string }
        idempotency_key: { type: string }
      required: [account_id, instrument_id, delta_qty, reason, idempotency_key]

    PnLLine:
      type: object
      properties:
        instrument_id: { type: string }
        realized_pnl: { type: string }
        unrealized_pnl: { type: string }
        fees: { type: string }
        funding: { type: string }
        turnover: { type: string }
        trades_count: { type: integer }

    PnLSummaryResponse:
      type: object
      properties:
        account_id: { type: string }
        base_currency: { type: string }
        from: { type: integer, format: int64 }
        to: { type: integer, format: int64 }
        equity_start: { type: string }
        equity_end: { type: string }
        realized_pnl: { type: string }
        unrealized_pnl: { type: string }
        fees: { type: string }
        funding: { type: string }
        slippage_cost: { type: string }
        formula_version: { type: string }
        breakdown:
          type: array
          items:
            $ref: '#/components/schemas/PnLLine'

    ReviewSummaryResponse:
      type: object
      properties:
        account_id: { type: string }
        from: { type: integer, format: int64 }
        to: { type: integer, format: int64 }
        win_rate: { type: number }
        profit_factor: { type: number }
        max_drawdown: { type: number }
        total_trades: { type: integer }
        avg_holding_seconds: { type: number }

    IndicatorPoint:
      type: object
      properties:
        ts: { type: integer, format: int64 }
        value:
          oneOf:
            - type: string
            - type: object

    IndicatorQueryResponse:
      type: object
      properties:
        instrument_id: { type: string }
        timeframe: { type: string }
        indicator: { type: string }
        points:
          type: array
          items:
            $ref: '#/components/schemas/IndicatorPoint'

    Candle:
      type: object
      properties:
        instrument_id: { type: string }
        timeframe: { type: string }
        ts_open: { type: integer, format: int64 }
        open: { type: string }
        high: { type: string }
        low: { type: string }
        close: { type: string }
        volume: { type: string }

    CandleQueryResponse:
      type: object
      properties:
        instrument_id: { type: string }
        timeframe: { type: string }
        candles:
          type: array
          items:
            $ref: '#/components/schemas/Candle'

    MarketEventItem:
      type: object
      properties:
        event_id: { type: string }
        category: { type: string }
        title: { type: string }
        summary: { type: string }
        source: { type: string }
        reliability: { type: string, enum: [OFFICIAL, SECONDARY, UNVERIFIED] }
        ts_event: { type: integer, format: int64 }

    MarketEventQueryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MarketEventItem'
