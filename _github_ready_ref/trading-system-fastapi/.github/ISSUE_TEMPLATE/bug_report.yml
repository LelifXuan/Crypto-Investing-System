name: Bug report
description: 报告一个可复现的问题
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供可复现信息，不要粘贴任何密钥、账号、token 或敏感日志。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 清楚描述发生了什么
      placeholder: 例如：POST /api/v1/positions/fills 在 single-user 模式下返回 500
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 使用配置 ...
        2. 执行请求 ...
        3. 观察到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关日志 / traceback
      render: shell
  - type: input
    id: version
    attributes:
      label: 项目版本
      placeholder: 例如 0.4.0 或 commit hash
  - type: input
    id: platform
    attributes:
      label: 运行环境
      placeholder: 例如 Windows 11 / Python 3.11 / PostgreSQL 16
