syntax = "proto3";

package trading.v1;

service PositionService {
  rpc GetPositions(GetPositionsRequest) returns (GetPositionsResponse);
  rpc StreamPositionUpdates(StreamPositionUpdatesRequest) returns (stream PositionUpdate);
}

service PnLService {
  rpc GetPnLSummary(GetPnLSummaryRequest) returns (PnLSummary);
}

service IndicatorService {
  rpc GetIndicatorSeries(GetIndicatorSeriesRequest) returns (GetIndicatorSeriesResponse);
}

service MarketDataService {
  rpc GetCandles(GetCandlesRequest) returns (GetCandlesResponse);
}

service MarketEventService {
  rpc GetMarketEvents(GetMarketEventsRequest) returns (GetMarketEventsResponse);
}

message DecimalValue {
  string value = 1;
}

message GetPositionsRequest {
  string account_id = 1;
  string strategy_id = 2;
  int64 as_of_ts = 3;
}

message PositionLot {
  string instrument_id = 1;
  string cost_method = 2;
  DecimalValue net_qty = 3;
  DecimalValue avg_cost_price = 4;
  DecimalValue mark_price = 5;
  DecimalValue gross_notional = 6;
  int64 updated_at = 7;
}

message GetPositionsResponse {
  string account_id = 1;
  int64 as_of_ts = 2;
  repeated PositionLot positions = 3;
}

message StreamPositionUpdatesRequest {
  string account_id = 1;
}

message PositionUpdate {
  string account_id = 1;
  string instrument_id = 2;
  DecimalValue net_qty = 3;
  DecimalValue avg_cost_price = 4;
  int64 updated_at = 5;
}

message GetPnLSummaryRequest {
  string account_id = 1;
  string strategy_id = 2;
  int64 from_ts = 3;
  int64 to_ts = 4;
  string base_currency = 5;
}

message PnLLine {
  string instrument_id = 1;
  DecimalValue realized_pnl = 2;
  DecimalValue unrealized_pnl = 3;
  DecimalValue fees = 4;
  DecimalValue funding = 5;
  DecimalValue turnover = 6;
  int32 trades_count = 7;
}

message PnLSummary {
  string account_id = 1;
  string base_currency = 2;
  int64 from_ts = 3;
  int64 to_ts = 4;
  DecimalValue equity_start = 5;
  DecimalValue equity_end = 6;
  DecimalValue realized_pnl = 7;
  DecimalValue unrealized_pnl = 8;
  DecimalValue fees = 9;
  DecimalValue funding = 10;
  DecimalValue slippage_cost = 11;
  string formula_version = 12;
  repeated PnLLine breakdown = 13;
}

message GetIndicatorSeriesRequest {
  string instrument_id = 1;
  string timeframe = 2;
  string indicator = 3;
  int64 from_ts = 4;
  int64 to_ts = 5;
}

message IndicatorPoint {
  int64 ts = 1;
  string value_json = 2;
}

message GetIndicatorSeriesResponse {
  string instrument_id = 1;
  string timeframe = 2;
  string indicator = 3;
  repeated IndicatorPoint points = 4;
}

message GetCandlesRequest {
  string instrument_id = 1;
  string timeframe = 2;
  int64 from_ts = 3;
  int64 to_ts = 4;
}

message Candle {
  string instrument_id = 1;
  string timeframe = 2;
  int64 ts_open = 3;
  DecimalValue open = 4;
  DecimalValue high = 5;
  DecimalValue low = 6;
  DecimalValue close = 7;
  DecimalValue volume = 8;
}

message GetCandlesResponse {
  repeated Candle candles = 1;
}

message GetMarketEventsRequest {
  string category = 1;
  string instrument_id = 2;
  int64 from_ts = 3;
  int64 to_ts = 4;
}

message MarketEvent {
  string event_id = 1;
  string category = 2;
  string title = 3;
  string summary = 4;
  string source = 5;
  string reliability = 6;
  int64 ts_event = 7;
}

message GetMarketEventsResponse {
  repeated MarketEvent items = 1;
}
