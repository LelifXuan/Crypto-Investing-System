version: 1.0.0
generated_at: '2026-04-05'
scope: market_event_sources_for_mainland_china_no_vpn_preferred
global_notes:
- 优先选择中国大陆可直接访问的官方站点、国内财经门户与中文 Web3 媒体；接入前仍需在目标部署网络实测可用性。
- official_priority 表示数据治理优先级：official > semi_official > domestic_aggregator > media
  > onchain_vendor。
- access_confidence 是工程判断，不是从中国大陆网络逐一实测得到的 SLA。
canonical_event_types:
- macro_release
- macro_policy
- macro_calendar
- market_holiday
- exchange_announcement
- listing
- delisting
- maintenance
- crypto_project_event
- token_unlock
- airdrop
- governance_vote
- liquidation_cluster
- whale_transfer
- exchange_flow
- onchain_spike
- regulatory
- risk_warning
- newsflash
