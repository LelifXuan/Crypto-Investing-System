<!DOCTYPE html>
<html lang="zh-CN"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>形态结构 | Crypto Trading System</title>
  <link rel="stylesheet" href="/static/styles.css?v=1778590799">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="market-structure" data-page-title="形态结构">
  <header class="shell-header">
    <div class="shell-brand">
      <p class="eyebrow">Crypto Trading System</p>
      <h1>形态结构</h1>
    </div>
  </header>

  <nav class="main-nav">
    <a href="/macro-calendar-page">宏观日历</a>
    <a href="/market-events-page">市场事件</a>
    <a href="/monitoring-page">监控总览</a>
    <a href="/structure-page">形态结构</a>
    <a href="/indicators-page">技术指标</a>
    <a href="/alerts-page">告警中心</a>
    <a href="/knowledge-page">知识百科</a>
    <a href="/strategy-page">AI策略</a>
  </nav>

  <main id="page-root">
    <section class="structure-page structure-page-compact">
      <section class="hero-card structure-toolbar-card">
        <div class="toolbar-grid">
          <label class="field">
            <span>交易品种</span>
            <select id="structure-instrument">
              <option value="btc-usdt-perp" selected="">BTC · Bitcoin</option><option value="eth-usdt-perp">ETH · Ethereum</option><option value="hype-usdt-perp">HYPE · Hyperliquid</option><option value="bnb-usdt-perp">BNB · Binance Coin</option><option value="okb-usdt-perp">OKB · OKX Token</option>
            </select>
          </label>
          <label class="field">
            <span>周期</span>
            <select id="structure-timeframe">
              <option value="1h">1h</option><option value="4h">4h</option><option value="1d" selected="">1d</option><option value="1w">1w</option><option value="1M">1M</option>
            </select>
          </label>
          <label class="field">
            <span>系统 
    <span class="tooltip-anchor compact tone-neutral" tabindex="0" aria-label="Breakout / 突破 | 有效突破要求收盘离开关键区间，并得到后续行为确认。">
      <span class="tooltip-icon">?</span>
      <span class="tooltip-bubble" role="tooltip">Breakout / 突破 | 有效突破要求收盘离开关键区间，并得到后续行为确认。<a class="tooltip-link" href="/knowledge-page#breakout">查看百科</a></span>
    </span>
  </span>
            <select id="structure-system">
              <option value="all" selected="">全部系统</option><option value="swing">摆动结构</option><option value="classic">经典图形</option><option value="profile">成交量 / 市场轮廓</option>
            </select>
          </label>
          <label class="field">
            <span>最低置信度 
    <span class="tooltip-anchor compact tone-neutral" tabindex="0" aria-label="KDJ 随机指标 | KDJ 用价格在近期高低区间中的位置衡量短线动量。">
      <span class="tooltip-icon">?</span>
      <span class="tooltip-bubble" role="tooltip">KDJ 随机指标 | KDJ 用价格在近期高低区间中的位置衡量短线动量。<a class="tooltip-link" href="/knowledge-page#kdj">查看百科</a></span>
    </span>
  </span>
            <select id="structure-confidence">
              <option value="0">0.00+</option><option value="0.3">0.30+</option><option value="0.5" selected="">0.50+</option><option value="0.7">0.70+</option>
            </select>
          </label>
          <label class="field">
            <span>视图模式 </span>
            <select id="structure-viewmode">
              <option value="focus" selected="">聚焦形态</option>
              <option value="context">结构背景</option>
              <option value="snapshot">完整快照</option>
            </select>
          </label>
          <div class="field action">
            <button id="structure-refresh" class="primary-button">手动刷新快照</button>
          </div>
        </div>
      </section>

      <section id="structure-statusbar"><div class="status-banner status-warning">暂无结构快照，已加入后台预计算队列。</div></section>

      <section class="structure-overview-grid">
        <article class="card structure-main-card">
          <div class="structure-main-head">
            <div>
              <p class="eyebrow">形态叠加图</p>
              <h2>BTC · 1d</h2>
            </div>
            <div id="structure-chart-bias"></div>
          </div>
          <div id="structure-chart-panel" class="structure-chart-panel empty"><div class="empty-state">当前还没有可用的结构快照，请先手动刷新。</div></div>
        </article>

        <article class="card structure-summary-card" id="structure-summary-panel">
        <article class="structure-summary-tile">
          <p class="eyebrow">缓存状态</p>
          <h3>缺少快照</h3>
          <p class="structure-copy">暂无结构快照，已加入后台预计算队列。</p>
        </article>
      </article>
      </section>

      <section class="card structure-detail-card">
        <div id="structure-detail-panel" class="structure-detail-grid">
        <article class="structure-detail-section structure-detail-block">
          <div class="list-card-head">
            <strong>检测诊断</strong>
            <span class="status-chip chip-neutral">只读缓存</span>
          </div>
          <p class="structure-copy">暂无结构快照，已加入后台预计算队列。</p>
        </article>
      </div>
      </section>
    </section>
  </main>

  <script>window.__ASSET_VERSION__ = "1778590799";</script>
  <script type="module" src="/static/main.js?v=1778590799"></script>

</body></html>
