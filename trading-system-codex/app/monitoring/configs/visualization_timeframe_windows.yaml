visualization_spec:
  global:
    min_visible_bars: 120
    max_visible_bars: 260
    default_calc_window_multiple: 3
    max_event_labels_per_chart: 8
    intraday_raw_macro_allowed: false
    intraday_macro_render_mode: step_signal_with_release_markers

  timeframes:
    "1h":
      visible_bars:
        short: 120
        default: 144
        long: 240
      windows:
        short: "3D"
        default: "14D"
        long: "30D"
      calc_bars: 720
      macro_render_mode: "事件标记 + 阶梯信号"

    "4h":
      visible_bars:
        short: 120
        default: 144
        long: 240
      windows:
        short: "14D"
        default: "60D"
        long: "24W"
      calc_bars: 720
      macro_render_mode: "事件标记 + 阶梯信号"

    "1d":
      visible_bars:
        short: 126
        default: 252
        long: 360
      windows:
        short: "3M"
        default: "12M"
        long: "36M"
      calc_bars: 756
      macro_render_mode: "原始值 + 平滑趋势"

    "1w":
      visible_bars:
        short: 52
        default: 260
        long: 520
      windows:
        short: "1Y"
        default: "5Y"
        long: "10Y"
      calc_bars: 520
      macro_render_mode: "周期结构 + 分位区间"

    "30d":
      visible_bars:
        short: 60
        default: 180
        long: 240
      windows:
        short: "5Y"
        default: "15Y"
        long: "ALL"
      calc_bars: 240
      macro_render_mode: "长周期位置 + 历史分位"

  acceptance:
    - "切换 1h / 4h / 1d / 1w / 1M 时，图表默认进入该周期 default 窗口。"
    - "前端渲染只显示可视窗口，指标计算与抓取使用 calc_bars。"
    - "高频视图不直接绘制低频宏观原始折线，只显示事件标记或阶梯状态。"
    - "低频视图保留足够历史长度，用于趋势、分位与 regime 判断。"
    - "窗口切换不改变排序与指标计算结果，只改变可视范围。"
