<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} | Market Research Terminal</title>
  <link rel="stylesheet" href="/static/styles.css?v={{ asset_version }}">
  {% if page_id == "ai-strategy" %}
  <link rel="stylesheet" href="/static/styles-v15.css?v={{ asset_version }}">
  {% endif %}
</head>
<body data-page="{{ page_id }}" data-page-title="{{ title }}">
  <header class="shell-header">
    <div class="shell-brand">
      <p class="eyebrow">Market Research Terminal / 市场研究终端</p>
      <h1>{{ title }}</h1>
    </div>
  </header>

  <nav class="main-nav main-nav-grouped" aria-label="主导航">
    <div class="nav-section" data-nav-scope="shared">
      <span class="nav-section-label">共享</span>
      <a data-page-link="macro-calendar" href="/macro-calendar-page">宏观日历</a>
      <a data-page-link="knowledge-base" href="/knowledge-page">知识百科</a>
    </div>
    <div class="nav-section" data-nav-scope="crypto">
      <span class="nav-section-label">Crypto</span>
      <a data-page-link="market-events" href="/market-events-page">市场事件</a>
      <a data-page-link="monitoring-overview" href="/monitoring-page">监控总览</a>
      <a data-page-link="market-structure" href="/structure-page">形态结构</a>
      <a data-page-link="market-analysis" href="/indicators-page">技术指标</a>
      <a data-page-link="alert-center" href="/alerts-page">告警中心</a>
      <a data-page-link="ai-strategy" href="/strategy-page">AI策略</a>
    </div>
    <div class="nav-section" data-nav-scope="ashare">
      <span class="nav-section-label">A股</span>
      <a data-page-link="ashare-etf" href="/ashare-etf-page">A股ETF</a>
    </div>
  </nav>

  <main id="page-root"></main>

  {% if page_id == "market-analysis" %}
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  {% endif %}
  <script>window.__ASSET_VERSION__ = "{{ asset_version }}";</script>
  <script type="module" src="/static/main.js?v={{ asset_version }}"></script>
</body>
</html>
