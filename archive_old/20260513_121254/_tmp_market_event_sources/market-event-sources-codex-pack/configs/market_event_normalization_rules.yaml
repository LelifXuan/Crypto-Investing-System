version: 1.0.0
field_mapping:
  canonical_fields:
  - event_id
  - source_id
  - source_item_id
  - event_type
  - event_subtype
  - title
  - summary
  - scheduled_at
  - published_at
  - detected_at
  - effective_at
  - ended_at
  - timezone
  - market_scope
  - region
  - country
  - exchange
  - asset_symbol
  - base_asset
  - quote_asset
  - entity_name
  - entity_type
  - importance
  - severity
  - status
  - is_confirmed
  - original_url
  - raw_payload
  - tags
  importance_mapping:
    critical:
    - 央行公开市场业务规则调整
    - 交易所下架
    - 交易所维护影响下单/提现
    - 重大监管发布
    high:
    - LPR
    - PMI
    - PPI
    - 国民经济运行情况
    - 新合约/现货上线
    - 代币解锁
    - CPI/NFP/FOMC from aggregators
    medium:
    - 一般公告
    - 项目升级
    - 媒体快讯
    low:
    - 活动预告
    - 一般会议
    - 非市场化品牌动态
  severity_mapping:
    critical: 90
    high: 70
    medium: 50
    low: 20
  event_subtype_examples:
  - pmi
  - ppi
  - gdp
  - retail_sales
  - omo
  - lpr
  - fx_fixing
  - policy_meeting
  - press_conference
  - listing_spot
  - listing_futures
  - delisting
  - maintenance
  - token_unlock
  - conference
  - liquidation
  - whale_transfer
  - exchange_netflow
  - regulatory_notice
dedupe_rules:
- name: url_exact
  condition: same(original_url)
- name: source_item_exact
  condition: same(source_id, source_item_id)
- name: semantic_same_day
  condition: same(source_id, title_normalized, event_date)
- name: cross_source_merge
  condition: same(asset_symbol, event_subtype, abs(scheduled_at diff)<=10m)
entity_extraction_hints:
  symbols_regex:
  - \b[A-Z0-9]{2,15}USDT\b
  - \(([A-Z0-9]{2,15})\)
  exchange_keywords:
  - Gate
  - Binance
  - OKX
  - Bybit
  - Coinbase
  macro_keywords:
  - PMI
  - PPI
  - CPI
  - LPR
  - 逆回购
  - 国民经济运行
  - 国际收支
