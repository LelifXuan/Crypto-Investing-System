name: Feature request
description: 提议一个新能力或改进点
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题
      placeholder: 例如：目前 market events 只支持 RSS，希望支持更多事件源
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你的方案
      placeholder: 请描述你希望的行为、接口或配置项
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 影响范围
      placeholder: 会影响哪些模块、接口、表结构或 worker
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      placeholder: 有无替代设计、兼容做法、风险点
